<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>康老师汉语学习中心</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f6f8fb;
}

/* 顶部横幅 */
.hero{
    background:linear-gradient(120deg,#1e2a44,#2f3b5b);
    color:white;
    padding:50px 20px;
    text-align:center;
}

.hero h1{
    font-size:28px;
    margin:0;
}

.hero p{
    margin-top:10px;
    opacity:0.9;
}

.hero a{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    background:#4caf50;
    color:white;
    border-radius:6px;
    text-decoration:none;
}

/* 区块 */
.section{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* 卡片 */
.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* 学习路径 */
.path{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.path div{
    background:#1e2a44;
    color:white;
    padding:8px 12px;
    border-radius:20px;
    font-size:13px;
}

/* 按钮 */
a.btn{
    display:inline-block;
    margin-top:8px;
    padding:6px 10px;
    background:#1e2a44;
    color:white;
    border-radius:6px;
    text-decoration:none;
    font-size:13px;
}

/* 班级进度条 */
.bar{
    background:#eee;
    height:8px;
    border-radius:20px;
}

.fill{
    height:8px;
    background:#4caf50;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>康老师汉语学习中心</h1>
<p>HSK教学辅助平台 · 学习汉语 · 了解中国</p>
<a href="#course">开始学习</a>
</div>

<div class="section">

<!-- 学习路径 -->
<div class="card">
<h2>📌 学习路径</h2>
<div class="path">
<div>HSK1</div>
<div>HSK2</div>
<div>HSK3</div>
<div>HSK3.0</div>
</div>
</div>

<!-- 班级进度 -->
<div class="card">
<h2>📊 班级进度</h2>

<p>HSK2-A班</p>
<div class="bar"><div class="fill" style="width:47%"></div></div>

<p>HSK2-B班</p>
<div class="bar"><div class="fill" style="width:33%"></div></div>

</div>

<!-- 课程入口 -->
<div class="card" id="course">
<h2>📚 课程入口</h2>

<p>HSK2 第7课</p>
<a class="btn" href="https://kanglaoshi.github.io/HSK2_7.dilfuza/" target="_blank">
进入课程
</a>

</div>

<!-- HSK3.0 -->
<div class="card">
<h2>📖 HSK 3.0</h2>
<p>分级学习系统（1 - 6级）</p>
<a class="btn" href="#">进入HSK3.0</a>
</div>

<!-- 其他 -->
<div class="card">
<h2>🎵 汉语歌曲</h2>
</div>

<div class="card">
<h2>🏆 学生作品</h2>
</div>

</div>

</body>
</html>
