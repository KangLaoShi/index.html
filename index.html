<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>康老师汉语学习中心</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#F8FAFC;
    color:#0F172A;
}

/* HERO */
.hero{
    background:linear-gradient(120deg,#4F46E5,#6366F1);
    color:white;
    padding:55px 20px;
    text-align:center;
}

.hero h1{
    font-size:28px;
    margin:0;
}

.hero p{
    margin-top:10px;
    opacity:0.9;
}

.hero a{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    background:#22C55E;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* 页面容器 */
.section{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* 卡片 */
.card{
    background:white;
    padding:18px;
    margin:12px 0;
    border-radius:14px;
    border:1px solid #E2E8F0;
    box-shadow:0 6px 18px rgba(15,23,42,0.06);
}

/* 学习路径 */
.path{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.path div{
    background:#4F46E5;
    color:white;
    padding:8px 12px;
    border-radius:20px;
    font-size:13px;
}

/* 按钮 */
a.button{
    display:inline-block;
    margin:5px 0;
    padding:8px 12px;
    background:#4F46E5;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-size:13px;
    transition:0.2s;
}

a.button:hover{
    background:#6366F1;
}

/* 进度条 */
.bar{
    background:#E2E8F0;
    height:8px;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:10px;
}

.fill{
    height:8px;
    background:#22C55E;
}

/* tabs */
.tabs{
    display:flex;
    flex-wrap:wrap;
}

.tab{
    padding:8px 12px;
    margin:5px;
    background:#E2E8F0;
    border-radius:20px;
    cursor:pointer;
    font-size:13px;
}

.tab.active{
    background:#4F46E5;
    color:white;
}

/* 内容 */
.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

/* footer */
footer{
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#64748B;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>康老师汉语学习中心</h1>
<p>HSK教学辅助平台 · 中文学习系统</p>
<a href="#course">开始学习</a>
</div>

<div class="section">

<!-- 学习路径 -->
<div class="card">
<h2>📌 学习路径</h2>
<div class="path">
<div>HSK1</div>
<div>HSK2</div>
<div>HSK3</div>
<div>HSK3.0</div>
</div>
</div>

<!-- 班级进度 -->
<div class="card">
<h2>📊 班级进度</h2>

<p>HSK2-A班</p>
<div class="bar"><div class="fill" style="width:47%"></div></div>

<p>HSK2-B班</p>
<div class="bar"><div class="fill" style="width:33%"></div></div>

</div>

<!-- 课程中心 -->
<div class="card" id="course">
<h2>📚 课程中心</h2>

<div class="tabs">
<div class="tab active" onclick="showTab('hsk1')">HSK1</div>
<div class="tab" onclick="showTab('hsk2')">HSK2</div>
<div class="tab" onclick="showTab('hsk3')">HSK3</div>
</div>

<!-- HSK1 -->
<div id="hsk1" class="tab-content active">

<a class="button" href="https://kanglaoshi.github.io/HSK1_5.dilfuza/" target="_blank">第1课</a><br>
<a class="button" href="https://kanglaoshi.github.io/HSK1_6hui.dilfuza/" target="_blank">第2课</a><br>

</div>

<!-- HSK2 -->
<div id="hsk2" class="tab-content">

<a class="button" href="https://kanglaoshi.github.io/HSK2_1jiu.dilfuza/" target="_blank">第1课</a><br>
<a class="button" href="https://kanglaoshi.github.io/HSK2_7.dilfuza/" target="_blank">第7课</a><br>

</div>

<!-- HSK3 -->
<div id="hsk3" class="tab-content">

<a class="button" href="https://kanglaoshi.github.io/HSK3_1dasuan.dilfuza/" target="_blank">第1课</a><br>

</div>

</div>

<!-- HSK3.0 -->
<div class="card">
<h2>📖 HSK 3.0 系统</h2>

<div class="tabs">
<div class="tab active" onclick="showTab('s1')">3.0-1</div>
<div class="tab" onclick="showTab('s2')">3.0-2</div>
<div class="tab" onclick="showTab('s3')">3.0-3</div>
<div class="tab" onclick="showTab('s4')">3.0-4</div>
<div class="tab" onclick="showTab('s5')">3.0-5</div>
<div class="tab" onclick="showTab('s6')">3.0-6</div>
</div>

<div id="s1" class="tab-content active">HSK3.0-1资料</div>
<div id="s2" class="tab-content">HSK3.0-2资料</div>
<div id="s3" class="tab-content">HSK3.0-3资料</div>
<div id="s4" class="tab-content">HSK3.0-4资料</div>
<div id="s5" class="tab-content">HSK3.0-5资料</div>
<div id="s6" class="tab-content">HSK3.0-6资料</div>

</div>

</div>

<footer>
© 康老师汉语学习中心 | 教学平台
</footer>

<script>
function showTab(id){

    document.querySelectorAll(".tab-content").forEach(e=>{
        e.classList.remove("active");
    });

    document.querySelectorAll(".tab").forEach(e=>{
        e.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
}
</script>

</body>
</html>
